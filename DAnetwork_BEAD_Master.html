function masterBeadLookup(state, fid) {
    state = state.toLowerCase();
    // Per-area provider lookups first (TX, OK have full detail)
    if (state === 'tx') {
        var txResult = txBeadLookup(fid);
        if (txResult) return txResult;
    }
    if (state === 'ok') {
        var okResult = okBeadLookup(fid);
        if (okResult) return okResult;
    }
    if (state === 'az') {
        var azProv = azNameProv[String(fid)];
        if (azProv) {
            return {
                name: azProv,
                color: stateConfig['az'] ? stateConfig['az'].color : '#E74C3C',
                state: 'az',
                providers: [{name: azProv}],
                funding: null
            };
        }
    }
    // State-level summary fallback for all states
    // For TX, OK, AZ where we have per-area lookups, show generic label if lookup missed
    if (stateSummaries[state]) {
        var fallbackName = (state === 'tx' || state === 'ok' || state === 'az') ? 'BEAD Award Area' :
            (stateSummaries[state].providers[0] ? stateSummaries[state].providers[0].name : 'BEAD Award');
        return {
            name: fallbackName,
            color: stateConfig[state] ? stateConfig[state].color : '#888',
            state: state,
            providers: stateSummaries[state].providers.slice(0, 5),
            funding: stateSummaries[state].total_bead
        };
    }
    return null;
}

// ===== CREATE BEAD LAYERS =====
var beadLayers = {};
var pbfStatesOnMap = {}; // track which PBF states are currently on the map

function createPbfLayer(st) {
    var cfg = stateConfig[st];
    var styles = {};

    styles[cfg.layerName] = function(properties) {
        var lookupKey = (st === 'az') ? (properties.name || properties.fid) : (properties.fid || properties.name);
        var info = masterBeadLookup(st, lookupKey);
        if (info) {
            if (danetworkOnly && !isDanetwork(info.name)) {
                return { fill: true, fillColor: '#ddd', fillOpacity: 0.08, stroke: true, color: '#ccc', weight: 0.5, opacity: 0.15 };
            }
            return {
                fill: true, fillColor: info.color, fillOpacity: 0.45,
                stroke: true, color: info.color, weight: 1, opacity: 0.7
            };
        }
        if (danetworkOnly) {
            return { fill: true, fillColor: '#ddd', fillOpacity: 0.08, stroke: true, color: '#ccc', weight: 0.5, opacity: 0.15 };
        }
        return {
            fill: true, fillColor: cfg.color, fillOpacity: 0.25,
            stroke: true, color: cfg.color, weight: 1, opacity: 0.5
        };
    };

    styles[cfg.layerName + '_labels'] = { fill: false, stroke: false };

    var layer = L.vectorGrid.protobuf(cfg.tileUrl, {
        vectorTileLayerStyles: styles,
        interactive: true,
        getFeatureId: function(f) { return f.properties.fid; },
        maxNativeZoom: cfg.maxNativeZoom,
        maxZoom: 16
    });

    layer.on('click', function(e) {
        var props = e.layer.properties;
        var lookupKey = (st === 'az') ? (props.name || props.fid) : (props.fid || props.name);
        var info = masterBeadLookup(st, lookupKey);
        var providerHtml = info
            ? '<span class="provider-tag" style="background:' + info.color + '">' + info.name + '</span>'
            : '<span style="color:#999;font-style:italic">Provider lookup pending</span>';

        var html = '<div class="info-panel">' +
            '<h4>' + cfg.name + ' BEAD Area</h4>' +
            '<div class="stat-row"><span class="stat-label">ID:</span><span class="stat-value">' + (props.fid || props.name || 'N/A') + '</span></div>' +
            '<div class="stat-row"><span class="stat-label">Provider:</span><span class="stat-value">' + providerHtml + '</span></div>';

        if (props.name && props.name !== props.fid) {
            html += '<div class="stat-row"><span class="stat-label">Name:</span><span class="stat-value">' + props.name + '</span></div>';
        }
        if (props.eligible_locations) {
            html += '<div class="stat-row"><span class="stat-label">Eligible Locs:</span><span class="stat-value">' + props.eligible_locations + '</span></div>';
        }
        if (props.cost_per_passing) {
            html += '<div class="stat-row"><span class="stat-label">Cost/Passing:</span><span class="stat-value">$' + props.cost_per_passing.toLocaleString(undefined,{maximumFractionDigits:0}) + '</span></div>';
        }
        if (props.cost) {
            html += '<div class="stat-row"><span class="stat-label">Total Cost:</span><span class="stat-value">$' + props.cost.toLocaleString(undefined,{maximumFractionDigits:0}) + '</span></div>';
        }
        if (props.reference_price) {
            html += '<div class="stat-row"><span class="stat-label">Ref Price:</span><span class="stat-value">$' + props.reference_price + '/mo</span></div>';
        }
        if (props.is_high_cost) {
            html += '<div class="stat-row"><span class="stat-label">High Cost:</span><span class="stat-value">' + (props.is_high_cost ? 'Yes' : 'No') + '</span></div>';
        }
        if (props.recommended_result) {
            html += '<div class="stat-row"><span class="stat-label">Status:</span><span class="stat-value">' + props.recommended_result + '</span></div>';
        }
        if (props.program_round_id) {
            html += '<div class="stat-row"><span class="stat-label">Round:</span><span class="stat-value">' + props.program_round_id + '</span></div>';
        }
        if (props.unserved !== undefined) {
            html += '<div class="stat-row"><span class="stat-label">Unserved:</span><span class="stat-value">' + props.unserved + '</span></div>';
        }
        if (props.underserved !== undefined) {
            html += '<div class="stat-row"><span class="stat-label">Underserved:</span><span class="stat-value">' + props.underserved + '</span></div>';
        }

        html += '</div>';
        L.popup({maxWidth: 320}).setLatLng(e.latlng).setContent(html).openOn(map);
    });

    return layer;
}

Object.keys(stateConfig).forEach(function(st) {
    var cfg = stateConfig[st];
    if (cfg.isGeoJSON) return;
    var layer = createPbfLayer(st);
    beadLayers[st] = layer;

    if (st === 'tx' || st === 'ok') {
        layer.addTo(map);
        pbfStatesOnMap[st] = true;
    } else {
        pbfStatesOnMap[st] = false;
    }
});


// ===== CREATE GEOJSON LAYERS FOR NON-TILED STATES =====
var geoJsonData = { mo: moCountyData, il: ilCountyData, nv: nvCountyData };

['mo', 'il', 'nv'].forEach(function(st) {
    var cfg = stateConfig[st];
    var layer = L.geoJSON(geoJsonData[st], {
        style: function(feature) {
            if (st === 'mo') {
                var prov = feature.properties.dominant_provider;
                var color = moProvColors[prov] || cfg.color;
                return { fillColor: color, fillOpacity: 0.35, color: color, weight: 1.5, opacity: 0.6 };
            }
            return { fillColor: cfg.color, fillOpacity: 0.2, color: cfg.color, weight: 1.5, opacity: 0.5 };
        },
        onEachFeature: function(feature, layer) {
            layer.on('click', function(e) {
                var props = feature.properties;
                var html = '<div class="info-panel"><h4>' + cfg.name + ' BEAD Area</h4>';
                html += '<div class="stat-row"><span class="stat-label">County:</span><span class="stat-value">' + props.NAME + '</span></div>';
                if (st === 'mo' && props.dominant_provider) {
                    html += '<div class="stat-row"><span class="stat-label">Provider:</span><span class="stat-value">' + props.dominant_provider + '</span></div>';
                    html += '<div class="stat-row"><span class="stat-label">Locations:</span><span class="stat-value">' + (props.loc_count || 'N/A') + '</span></div>';
                    try {
                        var allProvs = JSON.parse(props.all_providers || '{}');
                        var provList = Object.entries(allProvs).sort((a,b) => b[1]-a[1]);
                        if (provList.length > 1) {
                            html += '<div style="margin-top:6px;font-size:10px;font-weight:bold">All providers in county:</div>';
                            provList.forEach(function(p) {
                                html += '<div class="stat-row"><span class="stat-label" style="font-size:10px">' + p[0] + '</span><span class="stat-value" style="font-size:10px">' + p[1] + ' locs</span></div>';
                            });
                        }
                    } catch(e) {}
                }
                if (st === 'il') {
                    var ilProv = ilCountyProv[props.GEOID];
                    if (ilProv) {
                        html += '<div class="stat-row"><span class="stat-label">Provider:</span><span class="stat-value"><span class="provider-tag" style="background:#C0392B">' + ilProv + '</span></span></div>';
                    }
                }
                if (st === 'nv') {
                    var nvProv = nvCountyProv[props.GEOID];
                    var nvDaProv = nvDanetworkCounties[props.GEOID];
                    if (nvProv) {
                        html += '<div class="stat-row"><span class="stat-label">Provider:</span><span class="stat-value"><span class="provider-tag" style="background:#FF6B35">' + nvProv + '</span></span></div>';
                    }
                    if (nvDaProv) {
                        html += '<div class="stat-row"><span class="stat-label">DAnetwork:</span><span class="stat-value"><span class="provider-tag" style="background:#E74C3C">' + nvDaProv + ' ($71K)</span></span></div>';
                    }
                    if (!nvProv && !nvDaProv && stateSummaries.nv && stateSummaries.nv.providers.length > 0) {
                        html += '<div style="margin-top:6px;font-weight:bold;font-size:11px">Top Providers in Nevada:</div>';
                        stateSummaries.nv.providers.slice(0, 5).forEach(function(p) {
                            var beamStr = (p.bead/1000000).toFixed(1);
                            html += '<div style="font-size:10px">' + p.name.substring(0, 40) + ': $' + beamStr + 'M</div>';
                        });
                    }
                }
                html += '</div>';
                L.popup({maxWidth: 350}).setLatLng(e.latlng).setContent(html).openOn(map);
            });
        }
    });
    beadLayers[st] = layer;
    if (st === 'mo') layer.addTo(map);
});

// ===== STATE TOGGLE PANEL =====
var statePanel = L.control({position: 'topright'});
statePanel.onAdd = function() {
    var div = L.DomUtil.create('div', 'state-toggle');
    div.innerHTML = '<h4>BEAD Layers by State</h4>';
    
    Object.keys(stateConfig).forEach(function(st) {
        var cfg = stateConfig[st];
        var checked = (st === 'tx' || st === 'ok' || st === 'mo') ? 'checked' : '';
        var badge = cfg.hasProviders
            ? '<span class="state-badge" style="background:#27ae60;color:white">providers</span>'
            : '<span class="state-badge" style="background:#f39c12;color:white">areas only</span>';
        div.innerHTML += '<label><input type="checkbox" ' + checked + ' data-state="' + st + '"> ' + cfg.name + ' ' + badge + '</label>';
    });

    L.DomEvent.disableClickPropagation(div);
    
    div.addEventListener('change', function(e) {
        var st = e.target.getAttribute('data-state');
        if (e.target.checked) {
            beadLayers[st].addTo(map);
        } else {
            map.removeLayer(beadLayers[st]);
        }
    });

    return div;
};
statePanel.addTo(map);

    div.querySelector('#dafilter').addEventListener('change', function(e) {
        danetworkOnly = e.target.checked;
        applyDanetworkFilter();
    });
    return div;
};

function applyDanetworkFilter() {
    // GeoJSON states: restyle features
    ['mo','il','nv'].forEach(function(st) {
        if (!beadLayers[st]) return;
        beadLayers[st].eachLayer(function(layer) {
            var props = layer.feature.properties;
            var prov = '';
            if (st === 'mo') prov = props.dominant_provider || '';
            if (st === 'il') prov = ilCountyProv[props.GEOID] || '';
            if (st === 'nv') prov = nvCountyProv[props.GEOID] || '';
            var isDA = isDanetwork(prov) || (st === 'nv' && !!nvDanetworkCounties[props.GEOID]);
            if (danetworkOnly && !isDA) {
                layer.setStyle({fillOpacity: 0.03, opacity: 0.1, fillColor: '#ccc', color: '#ccc'});
            } else {
                var cfg = stateConfig[st];
                if (st === 'mo') {
                    var color = moProvColors[props.dominant_provider] || cfg.color;
                    layer.setStyle({fillColor: color, fillOpacity: 0.35, color: color, weight: 1.5, opacity: 0.6});
                } else {
                    layer.setStyle({fillColor: cfg.color, fillOpacity: 0.2, color: cfg.color, weight: 1.5, opacity: 0.5});
                }
            }
        });
    });
    // PBF tile states: destroy and recreate layers to force fresh style evaluation
    ['tx','ok','az'].forEach(function(st) {
        if (!beadLayers[st]) return;
        var wasOnMap = map.hasLayer(beadLayers[st]);
        if (wasOnMap) map.removeLayer(beadLayers[st]);
        beadLayers[st] = createPbfLayer(st);
        if (wasOnMap) beadLayers[st].addTo(map);
    });
}

// Network Infrastructure Layers
var towerLayers = {};

// E8/AtLink towers (186 + 7 + 1 = 194)
var atlinkLayer = L.layerGroup();
atlinkTowers.forEach(function(t) {
    L.circleMarker([t[0], t[1]], {radius: 5, fillColor: '#1ABC9C', color: '#0E6655', weight: 1, fillOpacity: 0.8})
     .bindPopup('<b>E8/AtLink Tower</b><br>' + (t[2] || ''))
     .addTo(atlinkLayer);
});
atlinkOIS.forEach(function(t) {
    L.circleMarker([t[0], t[1]], {radius: 5, fillColor: '#1ABC9C', color: '#0E6655', weight: 1, fillOpacity: 0.8})
     .bindPopup('<b>E8/OIS Tower</b><br>' + (t[2] || ''))
     .addTo(atlinkLayer);
});
atlinkOtoe.forEach(function(t) {
    L.circleMarker([t[0], t[1]], {radius: 5, fillColor: '#1ABC9C', color: '#0E6655', weight: 1, fillOpacity: 0.8})
     .bindPopup('<b>E8/Otoe Tower</b><br>' + (t[2] || ''))
     .addTo(atlinkLayer);
});
towerLayers['atlink'] = atlinkLayer;

// Wisper towers (1,186)
var wisperLayer = L.layerGroup();
wisperTowers.forEach(function(t) {
    L.circleMarker([t[0], t[1]], {radius: 4, fillColor: '#FF6B35', color: '#D84315', weight: 1, fillOpacity: 0.8})
     .bindPopup('<b>Wisper Tower</b><br>' + (t[2] || ''))
     .addTo(wisperLayer);
});
towerLayers['wisper'] = wisperLayer;

// WeLink FWA sites (41)
var welinkLayer = L.layerGroup();
welinkFWA.forEach(function(t) {
    L.circleMarker([t[0], t[1]], {radius: 5, fillColor: '#E74C3C', color: '#C62828', weight: 1, fillOpacity: 0.8})
     .bindPopup('<b>WeLink FWA Site</b><br>' + (t[2] || ''))
     .addTo(welinkLayer);
});
towerLayers['welink'] = welinkLayer;

// Tarana Ready towers (194: 75+119)
var taranaLayer = L.layerGroup();

allTarana.forEach(function(t) {
    L.circleMarker([t[0], t[1]], {radius: 4, fillColor: '#00BCD4', color: '#00838F', weight: 2, fillOpacity: 0.8, dashArray: '5,5'})

     .addTo(taranaLayer);
});

// Sprocket fiber polylines
var sprocketLayer = L.layerGroup();
sprocketPolylines.forEach(function(coords) {

     .addTo(sprocketLayer);
});

// ===== ADD NETWORK LAYERS TO MAP =====
atlinkLayer.addTo(map);
wisperLayer.addTo(map);
welinkLayer.addTo(map);
taranaLayer.addTo(map);
sprocketLayer.addTo(map);

// ===== BASE MAP TOGGLE =====
L.control.layers({"Streets": streets, "Satellite": satellite}, {
    "E8/AtLink Towers": atlinkLayer,
    "Wisper Towers": wisperLayer,
    "WeLink FWA": welinkLayer,
    "Tarana Ready": taranaLayer,
    "Sprocket Fiber": sprocketLayer
}, {collapsed: true, position: 'topleft'}).addTo(map);
