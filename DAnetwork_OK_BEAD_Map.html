function okBeadLookup(fid) {
    if (!fid) return null;
    var code = _okNet[fid];
    if (code && _okProv[code]) return {name: _okProv[code][0], color: _okProv[code][1], code: code};
    return null;
}

// Initialize map centered on Oklahoma
var map = L.map('map', {zoomControl: true}).setView([35.5, -97.5], 7);

// Base layers
var streets = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18, attribution: '&copy; OpenStreetMap'
});
var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    maxZoom: 18, attribution: '&copy; Esri'
});
streets.addTo(map);

// BEAD Award Layer
var beadLayer = L.vectorGrid.protobuf('https://tiling.ready.net/data/proposed_project_areas_ok/{z}/{x}/{y}.pbf', {
    vectorTileLayerStyles: {
        'proposed_project_areas_ok': function(properties) {
            var info = okBeadLookup(properties.fid);
            var color = info ? info.color : '#cccccc';
            return {
                fill: true,
                fillColor: color,
                fillOpacity: 0.45,
                stroke: true,
                color: color,
                weight: 1,
                opacity: 0.7
            };
        },
        'proposed_project_areas_ok_labels': { fill: false, stroke: false }
    },
    interactive: true,
    getFeatureId: function(f) { return f.properties.fid; },
    maxNativeZoom: 9,
    maxZoom: 14
});
beadLayer.addTo(map);

// BEAD click handler
beadLayer.on('click', function(e) {
    var props = e.layer.properties;
    var info = okBeadLookup(props.fid);
    var providerHtml = info
        ? '<span class="provider-tag" style="background:' + info.color + '">' + info.name + '</span>'
        : '<span style="color:#999">Unknown provider</span>';

    var html = '<div class="info-panel">' +
        '<h4>OK BEAD Award Area</h4>' +
        '<div class="stat-row"><span class="stat-label">NET ID:</span><span class="stat-value">' + (props.fid || 'N/A') + '</span></div>' +
        '<div class="stat-row"><span class="stat-label">Provider:</span><span class="stat-value">' + providerHtml + '</span></div>' +
        '<div class="stat-row"><span class="stat-label">Name:</span><span class="stat-value">' + (props.name || 'N/A') + '</span></div>' +
        '<div class="stat-row"><span class="stat-label">Eligible Locations:</span><span class="stat-value">' + (props.eligible_locations || 'N/A') + '</span></div>' +
        '<div class="stat-row"><span class="stat-label">Cost/Passing:</span><span class="stat-value">$' + (props.cost_per_passing ? props.cost_per_passing.toLocaleString(undefined,{maximumFractionDigits:0}) : 'N/A') + '</span></div>' +
        '<div class="stat-row"><span class="stat-label">Total Cost:</span><span class="stat-value">$' + (props.cost ? props.cost.toLocaleString(undefined,{maximumFractionDigits:0}) : 'N/A') + '</span></div>' +
        '<div class="stat-row"><span class="stat-label">High Cost Locs:</span><span class="stat-value">' + (props.high_cost_location_count || 0) + '</span></div>' +
        '</div>';

    L.popup({maxWidth: 320}).setLatLng(e.latlng).setContent(html).openOn(map);
});

// Layer control
var baseMaps = {"Streets": streets, "Satellite": satellite};
var overlayMaps = {"OK BEAD Awards (by provider)": beadLayer};
L.control.layers(baseMaps, overlayMaps, {collapsed: false, position: 'topright'}).addTo(map);

        var info = _okProv[p[0]];
        if (info) {
            div.innerHTML += '<div class="legend-item"><span class="legend-rect" style="background:' + info[1] + '"></span>' + p[1] + '</div>';
        }
    }

    div.innerHTML += '<div class="legend-item" style="margin-top:4px"><span class="legend-rect" style="background:#cccccc"></span>Unmapped / Other</div>';

    return div;
};
legend.addTo(map);
